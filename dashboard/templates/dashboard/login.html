<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Air Traffic Intelligence Platform</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#081229;
            color:white;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
        }
        .auth-card {
            background:#0f172a;
            padding:40px;
            border-radius:16px;
            width:340px;
            box-shadow:0 4px 20px rgba(0,0,0,.4);
        }
        h1 { font-size:24px; margin-bottom:20px; text-align:center; }
        input {
            width:100%;
            padding:10px;
            margin-bottom:14px;
            border-radius:8px;
            border:1px solid #1e293b;
            background:#081229;
            color:white;
        }
        button {
            width:100%;
            padding:10px;
            background:#3b82f6;
            border:none;
            border-radius:8px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }
        .error { color:#ef4444; font-size:13px; margin-bottom:10px; }
        .switch { text-align:center; margin-top:14px; font-size:14px; }
        .switch a { color:#3b82f6; text-decoration:none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>✈️ Login</h1>

        {% if form.errors %}
            <p class="error">Invalid username or password.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.username }}
            {{ form.password }}
            <button type="submit">Login</button>
        </form>

        <p class="switch">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
</body>
</html>
